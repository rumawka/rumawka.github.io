<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>BAKAI - Чек</title>
<style>
  :root {
    --bg: #f4f4f5;
    --card: #ffffff;
    --text: #0d2645;
    --muted: #8e9aa8;
    --line: #e5e7eb;
    --blue: #0a84ff;
    --light-blue: #eaf2ff;
    --green: #22c55e;
    --green-ring: #b8f3cb;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  body {
    overflow-x: hidden;
  }

  button, input {
    font: inherit;
  }

  .screen {
    width: 100%;
    min-height: 100vh;
    background: var(--bg);
  }

  .phone-shell {
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
  }

  .top-bar {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: calc(var(--safe-top) + 20px);
    padding-bottom: 18px;
    min-height: 104px;
  }

  .back-btn {
    position: absolute;
    left: 18px;
    top: calc(var(--safe-top) + 18px);
    width: 50px;
    height: 50px;
    border-radius: 999px;
    border: none;
    background: #f1f2f4;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #1d2734;
    cursor: pointer;
  }

  .back-btn svg {
    width: 22px;
    height: 22px;
  }

  .logo {
    width: 142px;
    height: auto;
    margin-top: 2px;
  }

  .content {
    padding: 2px 16px calc(126px + var(--safe-bottom));
  }

  .receipt-card {
    position: relative;
    background: var(--card);
    border-radius: 30px;
    overflow: hidden;
  }

  .receipt-top {
    text-align: center;
    padding: 34px 24px 18px;
  }

  .status-circle {
    width: 74px;
    height: 74px;
    margin: 0 auto 16px;
    border-radius: 999px;
    background: var(--green);
    box-shadow: inset 0 0 0 5px var(--green-ring);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .status-circle svg {
    width: 34px;
    height: 34px;
    stroke: #fff;
    stroke-width: 2.6;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .status-text {
    font-size: 24px;
    line-height: 1.15;
    font-weight: 500;
    margin-bottom: 14px;
    color: var(--text);
  }

  .amount-row {
    display: inline-flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    margin-bottom: 10px;
  }

  .amount {
    font-size: 62px;
    line-height: 0.95;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .currency,
  .fee-currency {
    display: inline-block;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .currency {
    font-size: 30px;
    line-height: 1;
    font-weight: 500;
    color: #6f7a87;
  }

  .fee-row {
    font-size: 21px;
    line-height: 1.2;
    color: var(--muted);
  }

  .fee-label {
    margin-right: 4px;
  }

  .tear-row {
    position: relative;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tear-line {
    width: calc(100% - 56px);
    border-top: 2px dashed #e4e7eb;
  }

  .tear-cut {
    position: absolute;
    top: 50%;
    width: 36px;
    height: 36px;
    background: var(--bg);
    border-radius: 999px;
    transform: translateY(-50%);
  }

  .tear-cut.left {
    left: -18px;
  }

  .tear-cut.right {
    right: -18px;
  }

  .receipt-bottom {
    text-align: center;
    padding: 4px 24px 28px;
  }

  .trx-number {
    font-size: 26px;
    line-height: 1.15;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }

  .trx-source {
    font-size: 24px;
    line-height: 1.18;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 12px;
  }

  .trx-date {
    font-size: 20px;
    line-height: 1.2;
    color: #7f8a98;
    font-weight: 400;
  }

  .details-wrap {
    display: flex;
    justify-content: center;
    padding: 14px 0 18px;
  }

  .details-btn {
    border: none;
    background: #f7f7f8;
    color: #263547;
    border-radius: 999px;
    min-height: 46px;
    padding: 0 26px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 17px;
    font-weight: 500;
    cursor: pointer;
  }

  .details-btn svg {
    width: 16px;
    height: 16px;
    color: #9aa4af;
  }

  .banner {
    width: 100%;
    display: block;
    border-radius: 18px;
    overflow: hidden;
  }

  .bottom-bar {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
  }

  .bottom-bar-inner {
    max-width: 430px;
    margin: 0 auto;
    padding: 0 16px calc(18px + var(--safe-bottom));
    display: flex;
    gap: 14px;
    align-items: center;
    pointer-events: auto;
  }

  .home-btn {
    flex: 1;
    min-height: 60px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(180deg, #1781f8 0%, #0b76ec 100%);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(11, 118, 236, 0.18);
  }

  .share-btn {
    width: 60px;
    height: 60px;
    border: none;
    border-radius: 20px;
    background: #e8f0fb;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .share-btn svg {
    width: 24px;
    height: 24px;
    stroke: #167df7;
    stroke-width: 2.15;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .edit-panel {
    margin: 0 16px;
    background: #ffffff;
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 8px 26px rgba(16, 24, 40, 0.04);
  }

  .editor-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .editor-subtitle {
    font-size: 15px;
    line-height: 1.4;
    color: #7a8794;
    margin-bottom: 18px;
  }

  .field {
    margin-bottom: 14px;
  }

  .field:last-of-type {
    margin-bottom: 0;
  }

  .field label {
    display: block;
    font-size: 12px;
    line-height: 1.2;
    font-weight: 600;
    color: #7c8794;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    min-height: 52px;
    padding: 0 16px;
    border: 1px solid #e7eaf0;
    border-radius: 16px;
    background: #fbfcfd;
    color: var(--text);
    font-size: 18px;
    outline: none;
  }

  .field input:focus {
    border-color: #8dbdff;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.08);
  }

  .editor-actions {
    padding: 16px;
  }

  .generate-btn {
    width: 100%;
    min-height: 58px;
    border: none;
    border-radius: 20px;
    background: #0d2645;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
  }

  .preview-note {
    padding: 0 16px 24px;
    font-size: 14px;
    line-height: 1.45;
    color: #7a8794;
  }

  @media (max-width: 390px) {
    .amount {
      font-size: 56px;
    }

    .trx-source,
    .trx-number {
      font-size: 22px;
    }

    .trx-date {
      font-size: 18px;
    }
  }
</style>
</head>
<body>
  <div id="editor-screen" class="screen">
    <div class="phone-shell">
      <div class="top-bar">
        <button class="back-btn" type="button" aria-label="Назад">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>

        <svg class="logo" viewBox="0 0 250 80" aria-label="BAKAI">
          <path d="m9.41 8.67h17.35c8.94 0 13.53 8.24 13.53 13.8 0 8.29-6.58 14.88-14.08 14.88h-16.45c4.75-4.42 5.5-9.26 5.5-13.59 0-6.24-3.02-11.98-5.85-15.09z" fill="#004EA2"/>

          <path d="m153.4 19.91h9.71v15.4c7.63-0.82 13.13-12.25 14.58-15.4h8.66c-3.1 9.2-7.98 16.16-14.13 19.42 7.55 2.96 12.48 11.78 14.49 20.41h-8.21c-3.54-8.82-9.68-15.88-15.39-16.83v16.57h-9.71v-39.57z" fill="#004EA2"/>
          <path d="m203.2 19.91h7.63l16.98 39.83h-10.03l-3.98-9.8h-13.26l-3.91 9.8h-8.99l15.56-39.83zm4.48 11.5-4.43 11.66h8.25l-3.82-11.66z" fill="#004EA2"/>
          <path d="m231 20.13h8.77v39.61h-8.77v-39.61z" fill="#004EA2"/>
        </svg>
      </div>

      <div class="edit-panel">
        <div class="editor-title">Редактор чека</div>
        <div class="editor-subtitle">Оставил editor-screen, но сам экран чека переделал ближе к референсу.</div>

        <div class="field">
          <label for="inp-num">Номер транзакции</label>
          <input id="inp-num" type="text" inputmode="numeric" value="154" />
        </div>

        <div class="field">
          <label for="inp-sum">Сумма</label>
          <input id="inp-sum" type="text" inputmode="decimal" value="17" />
        </div>

        <div class="field">
          <label for="inp-date">Дата и время</label>
          <input id="inp-date" type="text" value="02.04.2026 19:06:11" />
        </div>
      </div>

      <div class="editor-actions">
        <button class="generate-btn" type="button" onclick="generateReceipt()">Сформировать чек</button>
      </div>

      <div class="preview-note">
        Кнопка ниже открывает готовый экран. Можно менять сумму, номер и дату вручную.
      </div>
    </div>
  </div>

  <div id="receipt-screen" class="screen" style="display:none;">
    <div class="phone-shell">
      <div class="top-bar">
        <button class="back-btn" type="button" onclick="backToEditor()" aria-label="Назад">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>

        <svg class="logo" viewBox="0 0 250 80" aria-label="BAKAI">
          <path d="m9.41 8.67h17.35c8.94 0 13.53 8.24 13.53 13.8 0 8.29-6.58 14.88-14.08 14.88h-16.45c4.75-4.42 5.5-9.26 5.5-13.59 0-6.24-3.02-11.98-5.85-15.09z" fill="#004EA2"/>
          <path d="m9.41 42.25h17.35c8.94 0 13.53 8.24 13.53 13.8 0 8.3-6.58 14.88-14.08 14.88h-16.45c4.75-4.41 5.85-9.25 5.85-12.88 0-6.24-3.37-12.69-6.2-15.8z" fill="#004EA2"/>
          <path d="m41.09 8.67h17.34c8.95 0 13.28 8.24 13.28 13.8 0 8.29-6.58 14.88-14.08 14.88h-16.45c4.75-4.42 5.84-10.03 5.84-14.36 0-6.24-2.3-11.21-5.93-14.32z" fill="#C42945"/>
          <path d="m41.09 42.25h17.34c8.95 0 13.28 8.24 13.28 13.8 0 8.3-6.58 14.88-14.08 14.88h-16.45c4.75-4.41 5.84-9.25 5.84-13.58 0-6.24-2.3-11.99-5.93-15.1z" fill="#C42945"/>
          <path d="m83.92 19.91h14.5c7.99 0 10.96 7.01 10.96 10.21 0 3.59-2.15 6.62-3.89 7.97 3.37 1.15 6.57 4.47 6.57 9.82 0 6.67-6.36 11.83-13.27 11.83h-14.87v-39.83zm9.05 15.95h3.74c2.78 0 4.22-2.11 4.22-4.41s-1.79-4.31-3.94-4.31h-4.02v8.72zm0.05 16.08h5.4c4.41 0 5.19-2.56 5.19-4.48 0-2.05-1.15-4.3-4.69-4.3h-5.9v8.78z" fill="#004EA2"/>
          <path d="m127.5 19.91h7.01l16.44 39.83h-9.25l-3.76-9.48h-13.13l-3.65 9.48h-9l15.34-39.83zm3.16 11.5-3.82 11.33h8.25l-4.43-11.33z" fill="#004EA2"/>
          <path d="m153.4 19.91h9.71v15.4c7.63-0.82 13.13-12.25 14.58-15.4h8.66c-3.1 9.2-7.98 16.16-14.13 19.42 7.55 2.96 12.48 11.78 14.49 20.41h-8.21c-3.54-8.82-9.68-15.88-15.39-16.83v16.57h-9.71v-39.57z" fill="#004EA2"/>
          <path d="m203.2 19.91h7.63l16.98 39.83h-10.03l-3.98-9.8h-13.26l-3.91 9.8h-8.99l15.56-39.83zm4.48 11.5-4.43 11.66h8.25l-3.82-11.66z" fill="#004EA2"/>
          <path d="m231 20.13h8.77v39.61h-8.77v-39.61z" fill="#004EA2"/>
        </svg>
      </div>

      <div class="content">
        <section class="receipt-card" aria-label="Чек транзакции">
          <div class="receipt-top">
            <div class="status-circle">
              <svg viewBox="0 0 24 24">
                <path d="M20 6L9 17l-5-5"></path>
              </svg>
            </div>
            <div class="status-text">Success!</div>
            <div class="amount-row">
              <span id="out-sum" class="amount">17</span>
              <span class="currency">с</span>
            </div>
            <div class="fee-row"><span class="fee-label">Fee</span>0 <span class="fee-currency">с</span></div>
          </div>

          <div class="tear-row" aria-hidden="true">
            <span class="tear-cut left"></span>
            <span class="tear-line"></span>
            <span class="tear-cut right"></span>
          </div>

          <div class="receipt-bottom">
            <div id="out-num" class="trx-number">154</div>
            <div class="trx-source">By QR code <span id="out-qr">154</span></div>
            <div id="out-date" class="trx-date">02.04.2026 19:06:11</div>
          </div>
        </section>

        <div class="details-wrap">
          <button class="details-btn" type="button">
            Transaction details
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 9l6 6 6-6"></path>
            </svg>
          </button>
        </div>

        <img class="banner" src="https://cdn.bakai.kg/uploads/widgets/%D0%BA%D0%BE%D0%BF%D0%B8%D0%BB%D0%BA%D0%B0_288_eng.webp" alt="BAKAI Fund" />
      </div>

      <div class="bottom-bar">
        <div class="bottom-bar-inner">
          <button class="home-btn" type="button" onclick="backToEditor()">Back home</button>
          <button class="share-btn" type="button" aria-label="Поделиться">
            <svg viewBox="0 0 24 24">
              <path d="M12 16V3"></path>
              <path d="M8 7l4-4 4 4"></path>
              <path d="M4 13v6a1.8 1.8 0 0 0 1.8 1.8h12.4A1.8 1.8 0 0 0 20 19v-6"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

<script>
  function sanitizeValue(value, fallback) {
    const trimmed = String(value || '').trim();
    return trimmed === '' ? fallback : trimmed;
  }

  function generateReceipt() {
    const number = sanitizeValue(document.getElementById('inp-num').value, '154');
    const sum = sanitizeValue(document.getElementById('inp-sum').value, '17');
    const date = sanitizeValue(document.getElementById('inp-date').value, '02.04.2026 19:06:11');

    document.getElementById('out-num').textContent = number;
    document.getElementById('out-qr').textContent = number;
    document.getElementById('out-sum').textContent = sum;
    document.getElementById('out-date').textContent = date;

    document.getElementById('editor-screen').style.display = 'none';
    document.getElementById('receipt-screen').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
  }

  function backToEditor() {
    document.getElementById('receipt-screen').style.display = 'none';
    document.getElementById('editor-screen').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
  }
</script>
</body>
</html>
