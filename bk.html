<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BAKAI — Чек</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #f2f2f7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── EDITOR SCREEN ─── */
  #editor-screen {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 32px;
  }

  .top-bar {
    background: #f2f2f7;
    padding: 16px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* BAKAI Logo SVG */
  .bakai-logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-bak { color: #1565c0; }
  .logo-ai  { color: #d81b60; }

  .receipt-preview {
    background: white;
    border-radius: 20px;
    margin: 12px 16px;
    padding: 28px 24px 24px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    position: relative;
  }

  .receipt-preview::after {
    content: '';
    position: absolute;
    left: 24px; right: 24px;
    bottom: 68px;
    border-top: 1.5px dashed #e0e0e0;
  }

  .success-circle {
    width: 62px; height: 62px;
    background: #22c55e;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
  }

  .success-circle svg { width: 28px; height: 28px; stroke: white; stroke-width: 3; fill: none; }

  .success-label {
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    color: #111;
    margin-bottom: 6px;
  }

  .amount-row {
    text-align: center;
    font-size: 38px;
    font-weight: 700;
    color: #111;
    margin-bottom: 4px;
    line-height: 1;
  }

  .amount-row .cur {
    font-size: 22px;
    font-weight: 500;
    color: #888;
    font-style: italic;
  }

  .fee-row {
    text-align: center;
    font-size: 13px;
    color: #bbb;
    margin-bottom: 28px;
  }

  .receipt-body {
    text-align: center;
    padding-top: 20px;
  }

  .ref-num {
    font-size: 24px;
    font-weight: 700;
    color: #111;
    margin-bottom: 4px;
  }

  .qr-label {
    font-size: 14px;
    color: #555;
    margin-bottom: 4px;
  }

  .datetime-label {
    font-size: 13px;
    color: #aaa;
  }

  .details-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: #f0f0f5;
    border: none;
    border-radius: 20px;
    padding: 10px 22px;
    margin: 18px auto 0;
    font-size: 14px;
    color: #333;
    cursor: pointer;
    width: fit-content;
    font-family: inherit;
  }

  /* BAKAI Fund Banner */
  .fund-banner {
    margin: 0 16px;
    border-radius: 16px;
    overflow: hidden;
    background: linear-gradient(135deg, #1a3a8c 0%, #1565c0 60%, #1e88e5 100%);
    display: flex;
    align-items: stretch;
    min-height: 90px;
  }

  .fund-text-area {
    padding: 18px 0 18px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex: 1;
  }

  .fund-title {
    font-size: 20px;
    font-weight: 800;
    color: white;
    margin-bottom: 3px;
  }

  .fund-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
  }

  .fund-pig-area {
    width: 130px;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
  }

  /* Crystal piggy bank SVG */
  .fund-pig-area svg {
    width: 110px;
    height: 90px;
  }

  /* Editor panel */
  .editor-card {
    background: white;
    border-radius: 18px;
    margin: 16px 16px 0;
    padding: 18px 20px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }

  .editor-header {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 0.5px solid #f0f0f0;
  }

  .field-group {
    margin-bottom: 14px;
  }

  .field-group label {
    display: block;
    font-size: 12px;
    color: #999;
    font-weight: 500;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .field-group input {
    width: 100%;
    border: 1.5px solid #e8e8e8;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 20px;
    font-weight: 700;
    color: #111;
    outline: none;
    font-family: inherit;
    background: #fafafa;
    transition: border-color 0.2s, background 0.2s;
  }

  .field-group input:focus {
    border-color: #1565c0;
    background: white;
  }

  .field-hint {
    font-size: 11px;
    color: #ccc;
    margin-top: 5px;
  }

  /* Generate button */
  .generate-btn {
    display: block;
    width: calc(100% - 32px);
    margin: 16px auto 0;
    background: #1565c0;
    color: white;
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.2px;
    transition: background 0.15s, transform 0.1s;
  }

  .generate-btn:active {
    transform: scale(0.98);
    background: #0d47a1;
  }

  .generate-hint {
    text-align: center;
    font-size: 12px;
    color: #bbb;
    margin-top: 10px;
  }

  /* ─── RECEIPT FULLSCREEN ─── */
  #receipt-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: #f2f2f7;
    z-index: 100;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #receipt-screen.active {
    display: block;
  }

  .receipt-full {
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 40px;
  }

  .receipt-full .top-bar {
    position: relative;
    padding: 16px 20px 10px;
  }

  .close-btn {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 36px; height: 36px;
    border-radius: 50%;
    background: white;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 1px 5px rgba(0,0,0,0.12);
    font-size: 18px;
    color: #333;
    text-decoration: none;
    font-family: inherit;
  }

  .receipt-big-card {
    background: white;
    border-radius: 20px;
    margin: 12px 16px;
    padding: 32px 24px 24px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.09);
    position: relative;
  }

  .receipt-big-card::after {
    content: '';
    position: absolute;
    left: 24px; right: 24px;
    bottom: 68px;
    border-top: 1.5px dashed #e0e0e0;
  }

  .bottom-actions {
    display: flex;
    gap: 12px;
    padding: 16px 16px 0;
    align-items: center;
  }

  .home-btn {
    flex: 1;
    background: #1565c0;
    color: white;
    border: none;
    border-radius: 16px;
    padding: 18px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }

  .home-btn:active { background: #0d47a1; }

  .share-btn {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: #e3edf9;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* Live clock on editor */
  #live-clock {
    font-size: 13px;
    color: #aaa;
  }
</style>
</head>
<body>

  <div class="receipt-full">

    <div class="top-bar">
      <button class="close-btn" id="close-btn">←</button>
      <div class="bakai-logo">
        <svg width="32" height="28" viewBox="0 0 32 28" fill="none" xmlns="http://www.w3.org/2000/svg">

          <path d="M8 5.5H13.5C15.2 5.5 16.5 6.8 16.5 8.5C16.5 10.2 15.2 11.5 13.5 11.5H8V5.5Z" fill="white"/>
          <path d="M8 13H14C15.9 13 17.5 14.6 17.5 16.5C17.5 18.4 15.9 20 14 20H8V13Z" fill="white"/>
        </svg>
        <span class="logo-text"><span class="logo-bak">BAK</span><span class="logo-ai">AI</span></span>

    <div class="receipt-big-card">
      <div class="success-circle">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="success-label">Success!</div>
      <div class="amount-row">17 <span class="cur">с</span></div>
      <div class="fee-row">Fee 0 с</div>

      <div class="receipt-body">
        <div class="ref-num" id="frozen-num">154</div>
        <div class="qr-label">By QR code <span id="frozen-qr">154</span></div>
        <div class="datetime-label" id="frozen-datetime">—</div>
      </div>
    </div>

    <div style="display:flex;justify-content:center;margin-bottom:14px;">
      <button class="details-btn">Transaction details ▾</button>
    </div>

    <!-- BAKAI Fund Banner (same) -->
    <div class="fund-banner">
      <div class="fund-text-area">
        <div class="fund-title">BAKAI Fund</div>
        <div class="fund-sub">Savings that work for you</div>
      </div>
      <div class="fund-pig-area">

<script>
  function pad(n) { return n < 10 ? '0' + n : n; }

  function formatDate(d) {
    return pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear()
      + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  // Live clock on editor
  function tickClock() {
    document.getElementById('live-clock').textContent = formatDate(new Date());
  }
  tickClock();
  var clockInterval = setInterval(tickClock, 1000);

  // Sync preview number
  var inputNum = document.getElementById('input-number');
  function syncPreview() {
    var v = inputNum.value || '0';
    document.getElementById('preview-num').textContent = v;
    document.getElementById('preview-qr').textContent = v;
  }
  inputNum.addEventListener('input', syncPreview);

  // Generate: freeze time, show receipt
  document.getElementById('generate-btn').addEventListener('click', function() {
    var num = inputNum.value || '0';
    var frozenTime = formatDate(new Date());

    document.getElementById('frozen-num').textContent = num;
    document.getElementById('frozen-qr').textContent = num;
    document.getElementById('frozen-datetime').textContent = frozenTime;

    document.getElementById('receipt-screen').classList.add('active');
    document.getElementById('receipt-screen').scrollTop = 0;
    document.body.style.overflow = 'hidden';
  });

  // Close receipt
  function closeReceipt() {
    document.getElementById('receipt-screen').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.getElementById('close-btn').addEventListener('click', closeReceipt);
  document.getElementById('home-btn').addEventListener('click', closeReceipt);

  // Share
  document.getElementById('share-btn').addEventListener('click', function() {
    var num = document.getElementById('frozen-num').textContent;
    var dt = document.getElementById('frozen-datetime').textContent;
    var text = 'BAKAI — Успешный платёж\nСумма: 17 с\nНомер: ' + num + '\nBy QR code ' + num + '\n' + dt;

    if (navigator.share) {
      navigator.share({ title: 'BAKAI Чек', text: text });
    } else {
      navigator.clipboard && navigator.clipboard.writeText(text)
        .then(function() { alert('Скопировано в буфер обмена!'); });
    }
  });
</script>
