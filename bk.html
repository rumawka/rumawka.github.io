<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="BAKAI" />
<title>BAKAI - Чек</title>
<style>
  :root {
    --bg: #f4f4f4;
    --card: #fafafa;
    --text: #0b254d;
    --muted: #8c97a6;
    --line: #dfe2e6;
    --blue: #1983f8;
    --share-bg: #e9eff7;
    --green: #24ca5f;
    --green-ring: #c3efcc;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    overflow-x: hidden;
  }

  body, button, input {
    font: inherit;
  }

  .screen {
    width: 100%;
    min-height: 100svh;
    background: var(--bg);
  }

  .phone-shell {
    width: 100%;
    max-width: 430px;
    min-height: 100svh;
    margin: 0 auto;
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
  }

  .top-bar {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: calc(var(--safe-top) + 6px);
    padding-bottom: 2px;
    min-height: 68px;
    flex-shrink: 0;
  }

  .back-btn {
    position: absolute;
    left: 11px;
    top: calc(var(--safe-top) + 20px);
    width: 30px;
    height: 30px;
    border: none;
    border-radius: 999px;
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #1a2738;
    cursor: pointer;
  }

  .back-btn svg {
    width: 19px;
    height: 19px;
  }

  .logo {
    width: 90px;
    height: auto;
    display: block;
  }

  .receipt-shell {
    display: flex;
    flex-direction: column;
    min-height: 100svh;
  }

  .receipt-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 4px 10px 0;
    min-height: 0;
  }

  .receipt-card {
    position: relative;
    background: var(--card);
    border-radius: 28px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: inset 0 -1px 0 rgba(0,0,0,0.015);
  }

  .receipt-top {
    text-align: center;
    padding: 22px 24px 4px;
  }

  .status-circle {
    width: 62px;
    height: 62px;
    margin: 0 auto 9px;
    border-radius: 999px;
    background: var(--green);
    box-shadow: inset 0 0 0 4px var(--green-ring);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .status-circle svg {
    width: 28px;
    height: 28px;
    stroke: #fff;
    stroke-width: 2.8;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .status-text {
    font-size: 17px;
    line-height: 1.12;
    font-weight: 500;
    margin-bottom: 10px;
    color: var(--text);
  }

  .amount-row {
    display: inline-flex;
    align-items: baseline;
    justify-content: center;
    gap: 4px;
    margin-bottom: 10px;
  }

  .amount {
    font-size: 39px;
    line-height: 0.95;
    font-weight: 700;
    letter-spacing: -0.04em;
    color: var(--text);
  }

  .currency,
  .fee-currency {
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .currency {
    font-size: 22px;
    line-height: 1;
    font-weight: 400;
    color: #6b7787;
    position: relative;
    top: 1px;
  }

  .fee-row {
    font-size: 14px;
    line-height: 1.15;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .tear-row {
    position: relative;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tear-line {
    width: calc(100% - 74px);
    height: 2px;
    background-image: repeating-linear-gradient(90deg, var(--line) 0 10px, transparent 10px 20px);
    opacity: 0.9;
  }

  .tear-cut {
    position: absolute;
    top: 50%;
    width: 22px;
    height: 22px;
    background: var(--bg);
    border-radius: 999px;
    transform: translateY(-50%);
  }

  .tear-cut.left { left: -15px; }
  .tear-cut.right { right: -15px; }

  .receipt-bottom {
    text-align: center;
    padding: 10px 24px 18px;
    background: #fbfbfb;
  }

  .trx-number {
    font-size: 19px;
    line-height: 1.08;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }

  .trx-source {
    font-size: 16px;
    line-height: 1.12;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text);
  }

  .trx-date {
    font-size: 14px;
    line-height: 1.15;
    font-weight: 400;
    color: #8d98a6;
    opacity: 0.95;
  }

  .details-wrap {
    display: flex;
    justify-content: center;
    padding: 12px 0 14px;
    flex-shrink: 0;
  }

  .details-btn {
    min-height: 42px;
    padding: 0 24px;
    border: none;
    border-radius: 999px;
    background: #f8f8f8;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.015);
    color: #243346;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }

  .details-btn svg {
    width: 13px;
    height: 13px;
    color: #a2aab4;
  }

  .banner-wrap {
    flex-shrink: 0;
  }

  .banner {
    display: block;
    width: 100%;
    border-radius: 18px;
  }

  .receipt-spacer {
    flex: 1;
    min-height: 260px;
  }

  .bottom-bar {
    flex-shrink: 0;
    padding: 0 10px calc(16px + var(--safe-bottom));
  }

  .bottom-bar-inner {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .home-btn {
    flex: 1;
    min-height: 54px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(180deg, #1a88fb 0%, #147ef4 100%);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    box-shadow: 0 8px 20px rgba(24, 126, 244, 0.15);
    cursor: pointer;
  }

  .share-btn {
    width: 54px;
    height: 54px;
    border: none;
    border-radius: 18px;
    background: var(--share-bg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .share-btn svg {
    width: 22px;
    height: 22px;
    stroke: var(--blue);
    stroke-width: 2.15;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .edit-shell {
    min-height: 100svh;
  }

  .edit-panel {
    margin: 6px 12px 0;
    background: #fff;
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 8px 26px rgba(16, 24, 40, 0.04);
  }

  .editor-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .editor-subtitle {
    font-size: 15px;
    line-height: 1.4;
    color: #7a8794;
    margin-bottom: 18px;
  }

  .field {
    margin-bottom: 14px;
  }

  .field:last-of-type { margin-bottom: 0; }

  .field label {
    display: block;
    margin-bottom: 8px;
    font-size: 12px;
    line-height: 1.2;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: #7c8794;
  }

  .field input {
    width: 100%;
    min-height: 52px;
    padding: 0 16px;
    border: 1px solid #e7eaf0;
    border-radius: 16px;
    background: #fbfcfd;
    color: var(--text);
    font-size: 18px;
    outline: none;
  }

  .field input:focus {
    border-color: #8dbdff;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.08);
  }

  .editor-actions {
    padding: 16px 12px;
  }

  .generate-btn {
    width: 100%;
    min-height: 58px;
    border: none;
    border-radius: 20px;
    background: #0d2645;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
  }

  .preview-note {
    padding: 0 12px 24px;
    font-size: 14px;
    line-height: 1.45;
    color: #7a8794;
  }

  @media (max-height: 760px) {
    .top-bar {
      padding-top: calc(var(--safe-top) + 4px);
      min-height: 62px;
    }

    .back-btn {
      top: calc(var(--safe-top) + 3px);
      width: 38px;
      height: 38px;
    }

    .logo { width: 114px; }
    .receipt-content { padding-top: 2px; }
    .receipt-top { padding-top: 18px; }
    .status-circle { width: 58px; height: 58px; margin-bottom: 8px; }
    .amount { font-size: 37px; }
    .tear-row { height: 24px; }
    .receipt-bottom { padding-bottom: 16px; }
    .tear-line { width: calc(100% - 68px); }
    .tear-cut { width: 20px; height: 20px; }
    .tear-cut.left { left: -10px; }
    .tear-cut.right { right: -10px; }
    .receipt-spacer { min-height: 200px; }
  }
</style>
</head>
<body>
  <div id="editor-screen" class="screen">
    <div class="phone-shell edit-shell">
      <div class="top-bar">
        <button class="back-btn" type="button" aria-label="Назад">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>
        <svg class="logo" viewBox="0 0 250 80" aria-label="BAKAI">

          <path d="m153.4 19.91h9.71v15.4c7.63-0.82 13.13-12.25 14.58-15.4h8.66c-3.1 9.2-7.98 16.16-14.13 19.42 7.55 2.96 12.48 11.78 14.49 20.41h-8.21c-3.54-8.82-9.68-15.88-15.39-16.83v16.57h-9.71v-39.57z" fill="#004EA2"/>
          <path d="m203.2 19.91h7.63l16.98 39.83h-10.03l-3.98-9.8h-13.26l-3.91 9.8h-8.99l15.56-39.83zm4.48 11.5-4.43 11.66h8.25l-3.82-11.66z" fill="#004EA2"/>
          <path d="m231 20.13h8.77v39.61h-8.77v-39.61z" fill="#004EA2"/>
        </svg>
      </div>

      <div class="edit-panel">
        <div class="editor-title">Редактор чека</div>
        <div class="editor-subtitle">Оставил editor-screen. Экран чека поджат и сдвинут ближе к первому референсу.</div>

        <div class="field">
          <label for="inp-num">Номер транзакции</label>
          <input id="inp-num" type="text" inputmode="numeric" value="154" />
        </div>

        <div class="field">
          <label for="inp-sum">Сумма</label>
          <input id="inp-sum" type="text" inputmode="decimal" value="17" />
        </div>

        <div class="field">
          <label for="inp-date">Дата и время</label>
          <input id="inp-date" type="text" value="02.04.2026 19:06:11" />
        </div>
      </div>

      <div class="editor-actions">
        <button class="generate-btn" type="button" onclick="generateReceipt()">Сформировать чек</button>
      </div>

      <div class="preview-note">Для полноэкранного вида на iPhone страницу лучше запускать с домашнего экрана.</div>
    </div>
  </div>

  <div id="receipt-screen" class="screen" style="display:none;">
    <div class="phone-shell receipt-shell">
      <div class="top-bar">
        <button class="back-btn" type="button" onclick="backToEditor()" aria-label="Назад">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>
        <svg class="logo" viewBox="0 0 250 80" aria-label="BAKAI">
          <path d="m9.41 8.67h17.35c8.94 0 13.53 8.24 13.53 13.8 0 8.29-6.58 14.88-14.08 14.88h-16.45c4.75-4.42 5.5-9.26 5.5-13.59 0-6.24-3.02-11.98-5.85-15.09z" fill="#004EA2"/>
          <path d="m9.41 42.25h17.35c8.94 0 13.53 8.24 13.53 13.8 0 8.3-6.58 14.88-14.08 14.88h-16.45c4.75-4.41 5.85-9.25 5.85-12.88 0-6.24-3.37-12.69-6.2-15.8z" fill="#004EA2"/>
          <path d="m41.09 8.67h17.34c8.95 0 13.28 8.24 13.28 13.8 0 8.29-6.58 14.88-14.08 14.88h-16.45c4.75-4.42 5.84-10.03 5.84-14.36 0-6.24-2.3-11.21-5.93-14.32z" fill="#C42945"/>
          <path d="m41.09 42.25h17.34c8.95 0 13.28 8.24 13.28 13.8 0 8.3-6.58 14.88-14.08 14.88h-16.45c4.75-4.41 5.84-9.25 5.84-13.58 0-6.24-2.3-11.99-5.93-15.1z" fill="#C42945"/>
          <path d="m83.92 19.91h14.5c7.99 0 10.96 7.01 10.96 10.21 0 3.59-2.15 6.62-3.89 7.97 3.37 1.15 6.57 4.47 6.57 9.82 0 6.67-6.36 11.83-13.27 11.83h-14.87v-39.83zm9.05 15.95h3.74c2.78 0 4.22-2.11 4.22-4.41s-1.79-4.31-3.94-4.31h-4.02v8.72zm0.05 16.08h5.4c4.41 0 5.19-2.56 5.19-4.48 0-2.05-1.15-4.3-4.69-4.3h-5.9v8.78z" fill="#004EA2"/>
          <path d="m127.5 19.91h7.01l16.44 39.83h-9.25l-3.76-9.48h-13.13l-3.65 9.48h-9l15.34-39.83zm3.16 11.5-3.82 11.33h8.25l-4.43-11.33z" fill="#004EA2"/>
          <path d="m153.4 19.91h9.71v15.4c7.63-0.82 13.13-12.25 14.58-15.4h8.66c-3.1 9.2-7.98 16.16-14.13 19.42 7.55 2.96 12.48 11.78 14.49 20.41h-8.21c-3.54-8.82-9.68-15.88-15.39-16.83v16.57h-9.71v-39.57z" fill="#004EA2"/>

          <path d="m231 20.13h8.77v39.61h-8.77v-39.61z" fill="#004EA2"/>
        </svg>
      </div>

      <div class="receipt-content">
        <section class="receipt-card" aria-label="Чек транзакции">
          <div class="receipt-top">
            <div class="status-circle">
              <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"></path></svg>
            </div>
            <div class="status-text">Success!</div>
            <div class="amount-row">
              <span id="out-sum" class="amount">17</span>
              <span class="currency">с</span>
            </div>
            <div class="fee-row">Fee 0 <span class="fee-currency">с</span></div>
          </div>

          <div class="tear-row" aria-hidden="true">
            <span class="tear-cut left"></span>
            <span class="tear-line"></span>
            <span class="tear-cut right"></span>
          </div>

          <div class="receipt-bottom">
            <div id="out-num" class="trx-number">154</div>
            <div class="trx-source">By QR code <span id="out-qr">154</span></div>
            <div id="out-date" class="trx-date">02.04.2026 19:06:11</div>
          </div>
        </section>

        <div class="details-wrap">
          <button class="details-btn" type="button">
            Transaction details
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 9l6 6 6-6"></path>
            </svg>
          </button>
        </div>

        <div class="banner-wrap">
          <img class="banner" src="https://cdn.bakai.kg/uploads/widgets/%D0%BA%D0%BE%D0%BF%D0%B8%D0%BB%D0%BA%D0%B0_288_eng.webp" alt="BAKAI Fund" />
        </div>

        <div class="receipt-spacer"></div>
      </div>

      <div class="bottom-bar">
        <div class="bottom-bar-inner">
          <button class="home-btn" type="button" onclick="backToEditor()">Back home</button>
          <button class="share-btn" type="button" aria-label="Поделиться">
            <svg viewBox="0 0 24 24">
              <path d="M12 16V3"></path>
              <path d="M8 7l4-4 4 4"></path>
              <path d="M4 13v6a1.8 1.8 0 0 0 1.8 1.8h12.4A1.8 1.8 0 0 0 20 19v-6"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

<script>
  function sanitizeValue(value, fallback) {
    const trimmed = String(value || '').trim();
    return trimmed === '' ? fallback : trimmed;
  }

  function generateReceipt() {
    const number = sanitizeValue(document.getElementById('inp-num').value, '154');
    const sum = sanitizeValue(document.getElementById('inp-sum').value, '17');
    const date = sanitizeValue(document.getElementById('inp-date').value, '02.04.2026 19:06:11');

    document.getElementById('out-num').textContent = number;
    document.getElementById('out-qr').textContent = number;
    document.getElementById('out-sum').textContent = sum;
    document.getElementById('out-date').textContent = date;

    document.getElementById('editor-screen').style.display = 'none';
    document.getElementById('receipt-screen').style.display = 'block';
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    window.scrollTo(0, 0);
  }

  function backToEditor() {
    document.getElementById('receipt-screen').style.display = 'none';
    document.getElementById('editor-screen').style.display = 'block';
    document.documentElement.style.overflow = '';
    document.body.style.overflow = '';
    window.scrollTo(0, 0);
  }
</script>
</body>
</html>
