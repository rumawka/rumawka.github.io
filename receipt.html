<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="BAKAI" />
<title>BAKAI - Чек</title>
<style>
  :root {
    --bg: #f0f0f0;
    --card: #ffffff;
    --text: #0b1e3d;
    --muted: #8c97a6;
    --line: #d4d8de;
    --blue: #1a7cf8;
    --share-bg: #e4ecf8;
    --green: #28cc60;
    --green-ring: rgba(40,204,96,0.22);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    padding: 0;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    overflow-x: hidden;
    touch-action: none;
    -webkit-font-smoothing: antialiased;
  }

  .screen {
    width: 100%;
    min-height: 100svh;
    background: var(--bg);
  }

  .phone-shell {
    width: 100%;
    max-width: 430px;
    min-height: 100svh;
    margin: 0 auto;
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
    display: flex;
    flex-direction: column;
  }

  /* ─── TOP BAR ─── */
  .top-bar {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: calc(var(--safe-top) + 14px);
    padding-bottom: 10px;
    padding-left: 16px;
    padding-right: 16px;
    flex-shrink: 0;
  }

  .back-btn {
    position: absolute;
    left: 16px;
    bottom: 10px;
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 999px;
    background: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #1a2738;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.10);
  }

  .back-btn svg {
    width: 20px;
    height: 20px;
  }

  .logo {
    width: 92px;
    height: auto;
    display: block;
  }

  /* ─── RECEIPT SCREEN ─── */
  .receipt-shell {
    display: flex;
    flex-direction: column;
    min-height: 100svh;
  }

  .receipt-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 6px 12px 0;
  }

  /* Card */
  .receipt-card {
    background: var(--card);
    border-radius: 26px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .receipt-top {
    text-align: center;
    padding: 28px 24px 6px;
  }

  .status-circle {
    width: 66px;
    height: 66px;
    margin: 0 auto 12px;
    border-radius: 999px;
    background: var(--green);
    box-shadow: 0 0 0 8px var(--green-ring);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .status-circle svg {
    width: 30px;
    height: 30px;
    stroke: #fff;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .status-text {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 12px;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .amount-row {
    display: inline-flex;
    align-items: baseline;
    justify-content: center;
    gap: 5px;
    margin-bottom: 10px;
  }

  .amount {
    font-size: 44px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: -0.04em;
    color: var(--text);
  }

  .currency {
    font-size: 28px;
    line-height: 1;
    font-weight: 400;
    color: #8c9aac;
    text-decoration: underline;
    text-underline-offset: 3px;
    position: relative;
    top: 2px;
  }

  .fee-row {
    font-size: 14px;
    color: #a0aab5;
    margin-bottom: 6px;
    font-weight: 400;
  }

  .fee-row .fee-currency {
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  /* Tear */
  .tear-row {
    position: relative;
    height: 30px;
    display: flex;
    align-items: center;
    overflow: visible;
    margin-top: 4px;
  }

  .tear-line {
    flex: 1;
    height: 1.5px;
    margin: 0 32px;
    background-image: repeating-linear-gradient(
      90deg,
      var(--line) 0,
      var(--line) 8px,
      transparent 8px,
      transparent 18px
    );
  }

  .tear-cut {
    position: absolute;
    top: 50%;
    width: 56px;
    height: 56px;
    background: var(--bg);
    border-radius: 999px;
    transform: translateY(-50%);
    z-index: 2;
  }

  .tear-cut.left  { left: -28px; }
  .tear-cut.right { right: -28px; }

  /* Receipt bottom */
  .receipt-bottom {
    text-align: center;
    padding: 10px 24px 24px;
  }

  .trx-number {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 5px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .trx-source {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text);
  }

  .trx-date {
    font-size: 14px;
    color: #9aa3af;
    font-weight: 400;
  }

  /* Details button */
  .details-wrap {
    display: flex;
    justify-content: center;
    padding: 14px 0 16px;
    flex-shrink: 0;
  }

  .details-btn {
    min-height: 44px;
    padding: 0 22px;
    border: none;
    border-radius: 999px;
    background: #fff;
    color: #1e2c3e;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  .details-btn svg {
    width: 14px;
    height: 14px;
    color: #a2aab4;
    flex-shrink: 0;
  }

  /* Banner */
  .banner-wrap {
    flex-shrink: 0;
    border-radius: 20px;
    overflow: hidden;
  }

  .banner {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 20px;
  }

  .receipt-spacer { flex: 1; }

  /* Bottom bar */
  .bottom-bar {
    flex-shrink: 0;
    padding: 16px 12px calc(var(--safe-bottom) + 28px);
  }

  .bottom-bar-inner {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .home-btn {
    flex: 1;
    min-height: 56px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(180deg, #2088fc 0%, #1270e8 100%);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    box-shadow: 0 6px 18px rgba(18, 112, 232, 0.28);
    cursor: pointer;
  }

  .share-btn {
    width: 56px;
    height: 56px;
    border: none;
    border-radius: 18px;
    background: var(--share-bg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }

  .share-btn svg {
    width: 22px;
    height: 22px;
    stroke: var(--blue);
    stroke-width: 2.2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ─── EDITOR SCREEN ─── */
  .edit-shell {
    display: flex;
    flex-direction: column;
    min-height: 100svh;
  }

  .edit-panel {
    margin: 8px 12px 0;
    background: #fff;
    border-radius: 24px;
    padding: 20px 18px 22px;
  }

  .editor-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .editor-subtitle {
    font-size: 14px;
    line-height: 1.45;
    color: #7a8794;
    margin-bottom: 20px;
  }

  .field {
    margin-bottom: 14px;
  }

  .field:last-of-type { margin-bottom: 0; }

  .field label {
    display: block;
    margin-bottom: 7px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #8090a0;
  }

  .field input {
    width: 100%;
    min-height: 52px;
    padding: 0 16px;
    border: 1.5px solid #e7eaf0;
    border-radius: 16px;
    background: #fbfcfd;
    color: var(--text);
    font-size: 18px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .field input:focus {
    border-color: #8dbdff;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.10);
  }

  .editor-actions {
    padding: 16px 12px 8px;
  }

  .generate-btn {
    width: 100%;
    min-height: 58px;
    border: none;
    border-radius: 20px;
    background: #0d2645;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: -0.01em;
    transition: opacity 0.1s;
  }

  .generate-btn:active { opacity: 0.88; }

  .preview-note {
    padding: 0 14px 24px;
    font-size: 13px;
    line-height: 1.45;
    color: #9aa3ae;
    text-align: center;
  }
</style>
</head>
<body>

<!-- ═══ EDITOR SCREEN ═══ -->
<div id="editor-screen" class="screen">
  <div class="phone-shell edit-shell">
    <div class="top-bar">
      <button class="back-btn" type="button" aria-label="Назад">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>
      <svg class="logo" viewBox="0 0 250 80" aria-label="BAKAI">

        <path d="m231 20.13h8.77v39.61h-8.77v-39.61z" fill="#004EA2"/>
      </svg>
    </div>

    <div class="edit-panel">
      <div class="editor-title">Редактор чека</div>
      <div class="editor-subtitle">Заполните данные и нажмите кнопку ниже для формирования чека.</div>

      <div class="field">
        <label for="inp-num">Номер транзакции</label>
        <input id="inp-num" type="text" inputmode="numeric" value="154" />
      </div>

      <div class="field">
        <label for="inp-sum">Сумма</label>
        <input id="inp-sum" type="text" inputmode="decimal" value="17" />
      </div>

      <div class="field">
        <label for="inp-date">Дата и время</label>
        <input id="inp-date" type="text" value="Автоматически" readonly />
      </div>
    </div>

    <div class="editor-actions">
      <button class="generate-btn" type="button" onclick="generateReceipt()">Сформировать чек</button>
    </div>

    <div class="preview-note">Для полноэкранного вида на iPhone открывайте со страницы «На экран Домой».</div>
  </div>
</div>

<!-- ═══ RECEIPT SCREEN ═══ -->
<div id="receipt-screen" class="screen" style="display:none;">
  <div class="phone-shell receipt-shell">
    <div class="top-bar">
      <button class="back-btn" type="button" onclick="backToEditor()" aria-label="Назад">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>
      <svg class="logo" viewBox="0 0 250 80" aria-label="BAKAI">
        <path d="m9.41 8.67h17.35c8.94 0 13.53 8.24 13.53 13.8 0 8.29-6.58 14.88-14.08 14.88h-16.45c4.75-4.42 5.5-9.26 5.5-13.59 0-6.24-3.02-11.98-5.85-15.09z" fill="#004EA2"/>
        <path d="m9.41 42.25h17.35c8.94 0 13.53 8.24 13.53 13.8 0 8.3-6.58 14.88-14.08 14.88h-16.45c4.75-4.41 5.85-9.25 5.85-12.88 0-6.24-3.37-12.69-6.2-15.8z" fill="#004EA2"/>
        <path d="m41.09 8.67h17.34c8.95 0 13.28 8.24 13.28 13.8 0 8.29-6.58 14.88-14.08 14.88h-16.45c4.75-4.42 5.84-10.03 5.84-14.36 0-6.24-2.3-11.21-5.93-14.32z" fill="#C42945"/>
        <path d="m41.09 42.25h17.34c8.95 0 13.28 8.24 13.28 13.8 0 8.3-6.58 14.88-14.08 14.88h-16.45c4.75-4.41 5.84-9.25 5.84-13.58 0-6.24-2.3-11.99-5.93-15.1z" fill="#C42945"/>

        <path d="m127.5 19.91h7.01l16.44 39.83h-9.25l-3.76-9.48h-13.13l-3.65 9.48h-9l15.34-39.83zm3.16 11.5-3.82 11.33h8.25l-4.43-11.33z" fill="#004EA2"/>
        <path d="m153.4 19.91h9.71v15.4c7.63-0.82 13.13-12.25 14.58-15.4h8.66c-3.1 9.2-7.98 16.16-14.13 19.42 7.55 2.96 12.48 11.78 14.49 20.41h-8.21c-3.54-8.82-9.68-15.88-15.39-16.83v16.57h-9.71v-39.57z" fill="#004EA2"/>
        <path d="m203.2 19.91h7.63l16.98 39.83h-10.03l-3.98-9.8h-13.26l-3.91 9.8h-8.99l15.56-39.83zm4.48 11.5-4.43 11.66h8.25l-3.82-11.66z" fill="#004EA2"/>
        <path d="m231 20.13h8.77v39.61h-8.77v-39.61z" fill="#004EA2"/>
      </svg>
    </div>

    <div class="receipt-body">
      <section class="receipt-card" aria-label="Чек транзакции">
        <div class="receipt-top">
          <div class="status-circle">
            <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"></path></svg>
          </div>
          <div class="status-text">Success!</div>
          <div class="amount-row">
            <span id="out-sum" class="amount">17</span>
            <span class="currency">с</span>
          </div>
          <div class="fee-row">Fee <strong>0</strong> <span class="fee-currency">с</span></div>
        </div>

        <div class="tear-row" aria-hidden="true">
          <span class="tear-cut left"></span>
          <span class="tear-line"></span>
          <span class="tear-cut right"></span>
        </div>

        <div class="receipt-bottom">
          <div id="out-num" class="trx-number">154</div>
          <div class="trx-source">By QR code <span id="out-qr">154</span></div>
          <div id="out-date" class="trx-date">02.04.2026 19:06:11</div>
        </div>
      </section>

      <div class="details-wrap">
        <button class="details-btn" type="button">
          Transaction details
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9l6 6 6-6"></path>
          </svg>
        </button>
      </div>

      <div class="banner-wrap">
        <img class="banner"
          src="https://cdn.bakai.kg/uploads/widgets/%D0%BA%D0%B5%D1%88%D0%B1%D1%8D%D0%BA%201029%D1%85288%20eng-1%201.webp"
          alt="BAKAI Fund" />
      </div>

      <div class="receipt-spacer"></div>
    </div>

    <div class="bottom-bar">
      <div class="bottom-bar-inner">
        <button class="home-btn" type="button" onclick="backToEditor()">Back home</button>
        <button class="share-btn" type="button" aria-label="Поделиться">
          <svg viewBox="0 0 24 24">
            <path d="M12 16V3"></path>
            <path d="M8 7l4-4 4 4"></path>
            <path d="M4 13v6a1.8 1.8 0 0 0 1.8 1.8h12.4A1.8 1.8 0 0 0 20 19v-6"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  function getCurrentDateTime() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${pad(now.getDate())}.${pad(now.getMonth()+1)}.${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  }

  function sanitize(value, fallback) {
    const t = String(value || '').trim();
    return (t === '' || t === 'Автоматически') ? fallback : t;
  }

  function generateReceipt() {
    const number = sanitize(document.getElementById('inp-num').value, '154');
    const sum    = sanitize(document.getElementById('inp-sum').value, '17');

    document.getElementById('out-num').textContent  = number;
    document.getElementById('out-qr').textContent   = number;
    document.getElementById('out-sum').textContent  = sum;
    document.getElementById('out-date').textContent = getCurrentDateTime();

    document.getElementById('editor-screen').style.display  = 'none';
    document.getElementById('receipt-screen').style.display = 'block';
    window.scrollTo(0, 0);
  }

  function backToEditor() {
    document.getElementById('receipt-screen').style.display = 'none';
    document.getElementById('editor-screen').style.display  = 'block';
    window.scrollTo(0, 0);
  }
</script>
</body>
</html>
