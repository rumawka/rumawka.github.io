<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Transfer | Заказ поездки</title>
    <style>
        :root {
            --gold: #c5a059;
            --dark: #1a1a1a;
            --white: #ffffff;
            --grey: #f4f4f4;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background-color: var(--white);
            color: var(--dark);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .booking-card {
            background: var(--white);
            border: 1px solid #e0e0e0;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 4px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #666;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .price-display {
            background: var(--dark);
            color: var(--white);
            padding: 20px;
            text-align: center;
            margin: 30px 0;
            border-radius: 4px;
        }

        .price-value {
            font-size: 2rem;
            color: var(--gold);
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--dark);
            color: white;
            border: 1px solid var(--dark);
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--gold);
            border-color: var(--gold);
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Premium Transfer</h1>
        <p>Болгария • Стамбул • Восточная Европа</p>
    </header>

    <div class="booking-card">
        <div class="grid">
            <div>
                <label>Откуда</label>
                <select id="from" onchange="calculate()">
                    <option value="istanbul">Стамбул (Аэропорт)</option>
                    <option value="burgas">Бургас</option>
                    <option value="varna">Варна</option>
                </select>
            </div>
            <div>
                <label>Куда</label>
                <select id="to" onchange="calculate()">
                    <option value="burgas">Бургас</option>
                    <option value="varna">Варна</option>
                    <option value="istanbul">Стамбул (Аэропорт)</option>
                    <option value="sunny_beach">Солнечный Берег</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div>
                <label>Класс авто</label>
                <select id="carClass" onchange="calculate()">
                    <option value="1">Стандарт</option>
                    <option value="1.5">Бизнес (Mercedes E-Class)</option>
                    <option value="2">Минивэн (до 8 мест)</option>
                </select>
            </div>
            <div>
                <label>Дата поездки</label>
                <input type="date" id="date">
            </div>
        </div>

        <div class="price-display">
            Итоговая стоимость: <span class="price-value" id="totalPrice">0</span> €
        </div>

        <button onclick="sendOrder()">Забронировать трансфер</button>
    </div>
</div>

<script>
    // Примерная сетка тарифов (базовая цена за маршрут)
    const routes = {
        'istanbul-burgas': 180,
        'istanbul-varna': 220,
        'istanbul-sunny_beach': 190,
        'burgas-istanbul': 170,
        'varna-istanbul': 210,
        'burgas-varna': 60
    };

    function calculate() {
        const from = document.getElementById('from').value;
        const to = document.getElementById('to').value;
        const multiplier = parseFloat(document.getElementById('carClass').value);
        
        const routeKey = `${from}-${to}`;
        const basePrice = routes[routeKey] || 0;
        
        const finalPrice = basePrice * multiplier;
        document.getElementById('totalPrice').innerText = finalPrice;
    }

    function sendOrder() {
        const price = document.getElementById('totalPrice').innerText;
        if (price == 0) {
            alert("Пожалуйста, выберите корректный маршрут");
            return;
        }
        alert("Заявка принята! Мы свяжемся с вами для подтверждения. Цена: " + price + "€");
        // Здесь можно добавить интеграцию с Telegram ботом
    }

    // Инициализация при загрузке
    calculate();
</script>

</body>
</html>
