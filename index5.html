<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Transfer — Istanbul · Bulgaria · Eastern Europe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8A96E;
    --gold-light: #e8d5a3;
    --dark: #0D0D0D;
    --dark2: #161616;
    --dark3: #1E1E1E;
    --text: #E8E0D4;
    --muted: #7A7269;
    --border: rgba(200,169,110,0.2);
    --white: #FAF8F4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* ── LANG BAR ── */
  .lang-bar { position: fixed; top: 0; right: 0; left: 0; z-index: 100; display: flex; justify-content: flex-end; padding: 14px 40px; background: linear-gradient(to bottom, rgba(13,13,13,0.9), transparent); }
  .lang-btn { background: none; border: none; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; color: var(--muted); transition: 0.3s; }
  .lang-btn.active { color: var(--gold); border-bottom: 1px solid var(--gold); }

  /* ── HERO С ФОНОМ ── */
  .hero {
    position: relative; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 100px 20px 60px;
    background: 
        linear-gradient(to bottom, rgba(13,13,13,0.7) 0%, rgba(13,13,13,0.9) 100%),
        url('https://images.unsplash.com/photo-1549399542-7e3f8b79c340?auto=format&fit=crop&q=80&w=2000'); /* Фото темного авто */
    background-size: cover; background-position: center;
  }

  .hero-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); margin-bottom: 28px; display: flex; align-items: center; gap: 16px; }
  .hero-label::before, .hero-label::after { content: ''; display: block; width: 40px; height: 1px; background: var(--gold); opacity: 0.5; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(3rem, 8vw, 6rem); color: var(--white); margin-bottom: 10px; }
  .hero h1 em { font-style: italic; color: var(--gold); }
  .hero-sub { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 60px; }

  /* ── SECTION ── */
  .section { padding: 80px 20px; }
  .section-inner { max-width: 1100px; margin: 0 auto; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 2.5rem; color: var(--white); margin-bottom: 40px; }

  /* ── BOOKING GRID ── */
  .booking-grid { display: grid; grid-template-columns: 1fr 420px; gap: 60px; }
  @media (max-width: 900px) { .booking-grid { grid-template-columns: 1fr; } }

  .form-group { margin-bottom: 24px; text-align: left; }
  .form-group label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .form-control { width: 100%; padding: 16px; background: var(--dark3); border: 1px solid rgba(200,169,110,0.15); color: var(--text); font-family: 'Jost', sans-serif; border-radius: 0; transition: 0.3s; }
  .form-control:focus { outline: none; border-color: var(--gold); background: #1a1a1a; }

  /* ── PRICE BOX ── */
  .price-box { background: var(--dark2); border: 1px solid var(--border); padding: 40px; position: sticky; top: 100px; }
  .price-number { font-family: 'Cormorant Garamond', serif; font-size: 4.5rem; color: var(--gold); line-height: 1; display: flex; align-items: flex-start; gap: 5px; }
  .price-currency { font-size: 1.5rem; margin-top: 15px; }

  .btn-book { width: 100%; padding: 22px; background: var(--gold); color: var(--dark); border: none; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 20px; }
  .btn-book:hover { background: var(--white); box-shadow: 0 0 20px rgba(200,169,110,0.4); }

  [data-en] { display: none; }
  body.en [data-ru] { display: none; }
  body.en [data-en] { display: inline-block; }
</style>
</head>
<body>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('ru')" id="btn-ru">RU</button>
  <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
</div>

<section class="hero">
  <div class="hero-label"><span data-ru>Премиальный трансфер</span><span data-en>Premium Transfer</span></div>
  <h1>Elite <em>Transfer</em></h1>
  <p class="hero-sub"><span data-ru>Стамбул • Болгария • Европа</span><span data-en>Istanbul • Bulgaria • Europe</span></p>
  <button class="btn-book" style="width:auto; padding: 15px 40px;" onclick="document.getElementById('booking').scrollIntoView({behavior:'smooth'})">
    <span data-ru>Рассчитать поездку</span><span data-en>Get a quote</span>
  </button>
</section>

<section class="section" id="booking">
  <div class="section-inner">
    <h2 class="section-title"><span data-ru>Бронирование</span><span data-en>Booking</span></h2>
    <div class="booking-grid">
      <div class="booking-form">
        <div class="form-group">
          <label><span data-ru>Маршрут</span><span data-en>Route</span></label>
          <select class="form-control" id="f-route" onchange="recalc()">
            <option value="180" data-ru="Стамбул → Бургас" data-en="Istanbul → Burgas">Стамбул → Бургас (180€)</option>
            <option value="230" data-ru="Стамбул → Варна" data-en="Istanbul → Varna">Стамбул → Варна (230€)</option>
            <option value="350" data-ru="Стамбул → София" data-en="Istanbul → Sofia">Стамбул → София (350€)</option>
            <option value="70"  data-ru="Бургас → Варна" data-en="Burgas → Varna">Бургас → Варна (70€)</option>
          </select>
        </div>
        <div class="form-group">
          <label><span data-ru>Класс авто</span><span data-en>Car Class</span></label>
          <select class="form-control" id="f-class" onchange="recalc()">
            <option value="1" data-ru="Комфорт" data-en="Comfort">Комфорт (Mercedes C / VW Passat)</option>
            <option value="1.5" data-ru="Бизнес" data-en="Business">Бизнес (Mercedes E / BMW 5)</option>
            <option value="2.2" data-ru="Минивэн" data-en="Minivan">Минивэн (V-Class / Vito)</option>
          </select>
        </div>
        <div class="form-group">
          <label><span data-ru>Телефон</span><span data-en>Phone</span></label>
          <input type="text" class="form-control" id="f-phone" placeholder="+7 (___) ___-__-__" oninput="maskPhone(this)">
        </div>
        <div class="form-group">
          <label><span data-ru>Имя</span><span data-en>Name</span></label>
          <input type="text" class="form-control" id="f-name">
        </div>
      </div>

      <div class="price-side">
        <div class="price-box">
          <div style="font-size: 10px; letter-spacing: 2px; color: var(--gold); margin-bottom: 20px;">ESTIMATED PRICE</div>
          <div class="price-number"><span class="price-currency">€</span><span id="p-total">180</span></div>
          <div id="p-route-desc" style="margin-top: 15px; font-size: 14px; color: var(--muted);"></div>
          <button class="btn-book" id="btn-book" onclick="sendBooking()">
            <span data-ru>Отправить заявку</span><span data-en>Confirm Booking</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  const TG_TOKEN = '8772133903:AAHPXEKuXFrzSBQWt8L60Nk1uO6Iqe4IEbw';
  const TG_CHAT_ID = '699505010';
  let currentLang = 'ru';

  function setLang(lang) {
    currentLang = lang;
    document.body.className = lang === 'en' ? 'en' : '';
    document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    recalc();
  }

  function maskPhone(input) {
    let val = input.value.replace(/\D/g, '');
    if (val.startsWith('7')) val = '+' + val;
    else if (val.length > 0) val = '+' + val;
    input.value = val.substring(0, 16);
  }

  function recalc() {
    const route = document.getElementById('f-route');
    const car = document.getElementById('f-class');
    const total = Math.round(route.value * car.value);
    document.getElementById('p-total').innerText = total;
    
    const routeName = route.options[route.selectedIndex].getAttribute('data-' + currentLang);
    const carName = car.options[car.selectedIndex].getAttribute('data-' + currentLang);
    document.getElementById('p-route-desc').innerText = `${routeName} (${carName})`;
  }

  async function sendBooking() {
    const phone = document.getElementById('f-phone').value;
    const name = document.getElementById('f-name').value;
    if (phone.length < 7) { alert('Введите телефон'); return; }

    const msg = `🚀 НОВЫЙ ЗАКАЗ\n📍 ${document.getElementById('p-route-desc').innerText}\n💰 Цена: ${document.getElementById('p-total').innerText}€\n👤 Имя: ${name}\n📱 Тел: ${phone}`;

    try {
      const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg })
      });
      if (res.ok) alert('Успешно! Мы свяжемся с вами.');
    } catch (e) { alert('Ошибка'); }
  }

  recalc();
</script>
</body>
</html>
