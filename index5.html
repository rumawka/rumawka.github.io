<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Transfer | Заявка</title>
    <style>
        :root { --gold: #c58940; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        h2 { font-weight: 300; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        label { display: block; text-align: left; margin: 10px 0 5px; font-size: 14px; color: #666; }
        select, input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .price-box { background: var(--dark); color: white; padding: 15px; border-radius: 4px; margin-bottom: 25px; font-size: 20px; }
        .price-box span { color: var(--gold); font-weight: bold; }
        button { width: 100%; padding: 15px; background: var(--dark); color: white; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        button:hover { background: var(--gold); }
    </style>
</head>
<body>

<div class="card">
    <h2>Transfer Service</h2>
    
    <label>Маршрут</label>
    <select id="route" onchange="updatePrice()">
        <option value="180">Стамбул — Бургас</option>
        <option value="220">Стамбул — Варна</option>
        <option value="60">Бургас — Варна</option>
    </select>

    <label>Ваш телефон (WhatsApp/TG)</label>
    <input type="text" id="phone" placeholder="+7 ___ ___ __ __">

    <div class="price-box">
        Стоимость: <span id="displayPrice">180</span>€
    </div>

    <button onclick="sendOrder()">Забронировать</button>
</div>

<script>
    // Токен и ID уже вшиты
    const TG_TOKEN = '8772133903:AAHPXEKuXFrzSBQWt8L60Nk1uO6Iqe4IEbw';
    const TG_CHAT_ID = '699505010';

    function updatePrice() {
        const price = document.getElementById('route').value;
        document.getElementById('displayPrice').innerText = price;
    }

    async function sendOrder() {
        const routeName = document.getElementById('route').selectedOptions[0].text;
        const price = document.getElementById('displayPrice').innerText;
        const phone = document.getElementById('phone').value;

        if (!phone || phone.length < 5) {
            alert("Пожалуйста, введите номер телефона для связи");
            return;
        }

        const message = `🚀 НОВЫЙ ЗАКАЗ\n\n📍 Маршрут: ${routeName}\n💰 Цена: ${price}€\n📱 Клиент: ${phone}`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TG_CHAT_ID,
                    text: message
                })
            });

            const result = await response.json();

            if (result.ok) {
                alert("✅ Заявка успешно отправлена! Ожидайте звонка.");
            } else {
                alert("Ошибка: " + result.description);
            }
        } catch (error) {
            alert("Произошла ошибка при отправке. Проверьте соединение.");
        }
    }
</script>

</body>
</html>
